name: Build & Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag (e.g. v0.2.0). Creates the tag if not present.'
        required: true
        default: 'v0.1.0'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [ -z "$TAG" ] || [ "$TAG" = "main" ]; then TAG="${{ github.event.inputs.tag }}"; fi
          VERSION="${TAG#v}"
          # versionCode = unix epoch days × 10 + minor patch — monotonic, fits int
          VCODE=$(( ($(date -u +%s) / 60) % 2147483647 ))
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "vcode=$VCODE" >> "$GITHUB_OUTPUT"
          echo "Tag: $TAG  Version: $VERSION  versionCode: $VCODE"

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps || npm install --legacy-peer-deps

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Override keystore from secret (optional)
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > android/app/release.keystore
            echo "Keystore restored from ANDROID_KEYSTORE_BASE64 secret."
          else
            echo "Using committed android/app/release.keystore."
          fi

      - name: Gradle build (release APK)
        env:
          AISTORE_VERSION_NAME: ${{ steps.ver.outputs.version }}
          AISTORE_VERSION_CODE: ${{ steps.ver.outputs.vcode }}
          AISTORE_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          AISTORE_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          AISTORE_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew --no-daemon :app:assembleRelease

      - name: Locate APK
        id: apk
        run: |
          APK=$(find android/app/build/outputs/apk/release -name "*.apk" | head -1)
          OUT="ai-store-${{ steps.ver.outputs.tag }}.apk"
          cp "$APK" "$OUT"
          ls -la "$OUT"
          echo "path=$OUT" >> "$GITHUB_OUTPUT"

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          body: |
            Built from commit `${{ github.sha }}`.

            Install: download the APK below on your Android device, tap it, allow installation from unknown sources if prompted.
          files: ${{ steps.apk.outputs.path }}
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
